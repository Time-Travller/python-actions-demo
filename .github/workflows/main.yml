name: Python Install Demo

on:
  workflow_dispatch:

jobs:
  python-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python version
        run: python --version

      - name: Run Python file
        run: python app.py
